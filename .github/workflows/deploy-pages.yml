name: Deploy frontend to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Debug npm context
        working-directory: frontend
        run: |
          node --version
          npm --version
          npm config list --workspaces=false
          node -e "const pkg=require('./package.json'); console.log(JSON.stringify({name:pkg.name, version:pkg.version, dependencies:pkg.dependencies, devDependencies:pkg.devDependencies}, null, 2));"
          node -e "const pkg=require('./package.json'); const lock=require('./package-lock.json'); if (pkg.name !== lock.name || pkg.version !== lock.version) throw new Error('package-lock mismatch: '+lock.name+'@'+lock.version+' != '+pkg.name+'@'+pkg.version); if (lock.packages[''].workspaces) throw new Error('frontend/package-lock.json unexpectedly contains workspaces'); const workspaceEntries=Object.keys(lock.packages).filter((k)=>k==='frontend'||k==='worker'); if (workspaceEntries.length) throw new Error('frontend/package-lock.json contains workspace entries: '+workspaceEntries.join(',')); console.log('frontend lockfile matches package.json and has no workspaces');"

      - name: Install dependencies
        working-directory: frontend
        run: npm install --no-audit --no-fund --verbose --workspaces=false

      - name: Build frontend
        working-directory: frontend
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
        run: npm run build --workspaces=false

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: frontend/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
        with:
          timeout: 1800000
